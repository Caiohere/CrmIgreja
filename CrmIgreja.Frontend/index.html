<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CrmIgreja - Acesso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" style="display: flex; flex-direction: column; justify-content: center; padding: 2rem;">
    
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="color: var(--primary-color); font-size: 2rem; font-weight: 700;">CrmIgreja</h1>
      <p style="color: var(--text-light); font-size: 0.95rem;">Gestão de Eventos simples e ágil.</p>
    </div>

    <!-- Feedback Message -->
    <div id="feedbackMsg" class="alert d-none"></div>

    <!-- Login Area -->
    <div id="login-section" class="card">
      <h2 class="card-title text-center">Entrar</h2>
      
      <form id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="login-senha" required placeholder="********">
        </div>
        <button type="submit" class="btn btn-primary mt-2">Acessar</button>
      </form>
      
      <div class="text-center mt-3">
        <span style="color: var(--text-light); font-size: 0.9rem;">Não tem conta?</span>
        <button onclick="toggleAuthMode()" class="switch-link" style="background:none; border:none;">Registre-se</button>
      </div>
    </div>

    <!-- Register Area -->
    <div id="register-section" class="card d-none">
      <h2 class="card-title text-center">Criar Conta</h2>
      
      <form id="form-register">
        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" id="reg-nome" required placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label>Senha (Mínimo 8 dígitos, 1 n.º, 1 caract. especial)</label>
          <input type="password" id="reg-senha" required placeholder="Senhaorte#123">
        </div>
        <button type="submit" class="btn btn-primary mt-2">Cadastrar</button>
      </form>
      
      <div class="text-center mt-3">
        <span style="color: var(--text-light); font-size: 0.9rem;">Já possui conta?</span>
        <button onclick="toggleAuthMode()" class="switch-link" style="background:none; border:none;">Faça Login</button>
      </div>
    </div>

  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
